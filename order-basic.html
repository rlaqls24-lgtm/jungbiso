<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>작업지시서 (기본)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#f5f4f0; font-family:'Noto Sans KR',sans-serif; color:#1a1a1a; }

/* 모바일: 세로 스크롤 */
.app { display:flex; flex-direction:column; min-height:100vh; }

/* 상단 입력 */
.left-top { background:#fff; padding:16px; border-bottom:2px solid #e8e6e0; }
.logo { font-size:11px; font-weight:900; letter-spacing:.2em; color:#e85d00; margin-bottom:12px; }
.fi-row { display:flex; gap:10px; }
.fg { display:flex; flex-direction:column; gap:4px; flex:1; }
.fg label { font-size:10px; font-weight:700; color:#999; letter-spacing:.08em; text-transform:uppercase; }
.fi { background:#f8f7f4; border:1.5px solid #e0ddd6; border-radius:8px; padding:10px 12px; color:#1a1a1a; font-family:'Noto Sans KR',sans-serif; font-size:16px; outline:none; width:100%; }
.fi:focus { border-color:#e85d00; }
.fi::placeholder { color:#ccc; }
.logo-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.logo { font-size:11px; font-weight:900; letter-spacing:.2em; color:#e85d00; margin-bottom:0; }
.date-badge { font-size:12px; font-weight:700; color:#999; background:#f5f4f0; border-radius:6px; padding:4px 10px; }
.cartype-row { display:flex; gap:7px; margin-top:10px; }
.ct-btn { flex:1; padding:9px 4px; border:1.5px solid #e0ddd6; border-radius:8px; background:#f8f7f4; color:#aaa; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .15s; }
.ct-btn.on { border-color:#e85d00; background:rgba(232,93,0,.08); color:#e85d00; }
.price-bar { margin-top:14px; background:#fff8f5; border:1.5px solid rgba(232,93,0,.2); border-radius:10px; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
.price-label { font-size:12px; font-weight:700; color:#aaa; }
.price-amount { font-size:22px; font-weight:900; color:#e85d00; }
.price-detail { font-size:11px; color:#ccc; margin-top:2px; }

/* 도면 - 화면 꽉 차게 */
.right { background:#f0eeea; padding:12px 8px; display:flex; flex-direction:column; align-items:center; }
.dg-hint { font-size:12px; color:#bbb; margin-bottom:8px; }
.legend { display:flex; gap:12px; margin-bottom:12px; flex-wrap:wrap; justify-content:center; }
.leg { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:#555; }
.leg-box { width:26px; height:16px; border-radius:3px; border:2px solid #333; flex-shrink:0; }
.leg-box.half { background:repeating-linear-gradient(45deg,#fff,#fff 3px,#888 3px,#888 6px); }
.leg-box.one  { background:#aaa; }
.leg-box.two  { background:#333; }
#carSvg { width:100%; max-width:600px; display:block; }
.sel-count { margin-top:12px; background:rgba(232,93,0,.08); border:1.5px solid rgba(232,93,0,.25); border-radius:100px; padding:7px 18px; font-size:13px; color:#e85d00; font-weight:700; }

/* 체크리스트 */
.left-body { background:#fff; padding:16px; }
.cl-section { margin-bottom:16px; }
.cl-title { font-size:10px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:#bbb; margin-bottom:8px; padding-bottom:5px; border-bottom:1px solid #f0eeea; }
.cl-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.cl-item { border:1.5px solid #eee; border-radius:8px; overflow:hidden; cursor:pointer; transition:border-color .15s; background:#fff; }
.cl-item.checked { border-color:#e85d00; }
.cl-name-row { display:flex; align-items:center; gap:8px; padding:11px 12px 8px; }
.cl-box { width:20px; height:20px; border:1.5px solid #ddd; border-radius:4px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.cl-item.checked .cl-box { background:#e85d00; border-color:#e85d00; }
.cl-item.checked .cl-box::after { content:'✓'; color:#fff; font-size:13px; font-weight:900; }
.cl-name { font-size:15px; font-weight:600; color:#666; }
.cl-item.checked .cl-name { color:#c04d00; font-weight:700; }
.cl-opts { display:none; flex-direction:row; gap:5px; padding:0 12px 10px; }
.cl-item.checked .cl-opts { display:flex; }
.opt-btn { flex:1; padding:7px 0; border:1.5px solid #ddd; border-radius:6px; font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; color:#aaa; background:#fafaf8; cursor:pointer; text-align:center; }
.opt-btn.sel { color:#fff; border-color:transparent; }
.opt-btn[data-v="0.5"].sel { background:#666; }
.opt-btn[data-v="1"].sel   { background:#444; }
.opt-btn[data-v="2"].sel   { background:#111; }

/* 하단 버튼 */
.left-foot { background:#fff; padding:14px 16px; border-top:1px solid #eee; display:flex; gap:10px; position:sticky; bottom:0; }
.btn-submit { flex:3; padding:14px; background:#e85d00; color:#fff; border:none; border-radius:10px; font-family:'Noto Sans KR',sans-serif; font-size:16px; font-weight:900; cursor:pointer; }
.btn-clear { flex:1; padding:14px; background:transparent; color:#bbb; border:1.5px solid #eee; border-radius:10px; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }

.cp { cursor:pointer; }
.cp.hit-half { fill:url(#pat-half) !important; stroke:#333 !important; stroke-width:2.5 !important; }
.cp.hit-one  { fill:#aaa !important; stroke:#222 !important; stroke-width:3 !important; }
.cp.hit-two  { fill:#333 !important; stroke:#000 !important; stroke-width:4 !important; }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(8px); background:#1a1a1a; color:#fff; padding:11px 22px; border-radius:100px; font-size:14px; font-weight:700; opacity:0; transition:all .3s; pointer-events:none; z-index:100; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- 상단 입력 -->
  <div class="left-top">
    <div class="logo-row">
      <div class="logo">WORK ORDER — 기본</div>
      <div class="date-badge" id="todayDate"></div>
    </div>
    <div class="fi-row">
      <div class="fg"><label>차량번호</label><input class="fi" id="f-carnum" placeholder="12가 3456"></div>
      <div class="fg"><label>딜러명</label><input class="fi" id="f-dealer" placeholder="홍길동"></div>
    </div>
    <div style="margin-top:8px">
      <div class="fg"><label>차종</label><input class="fi" id="f-carmodel" placeholder="소나타, K5, 벤츠 E클래스..."></div>
    </div>
    <div class="cartype-row">
      <button class="ct-btn on" data-rate="90000" onclick="setCarType(this)">국산</button>
      <button class="ct-btn" data-rate="100000" onclick="setCarType(this)">국산 펄</button>
      <button class="ct-btn" data-rate="130000" onclick="setCarType(this)">외제차</button>
    </div>
  </div>

  <!-- 도면 -->
  <div class="right">
    <div class="dg-hint">도면을 탭해도 선택돼요</div>
    <div class="legend">
      <div class="leg"><div class="leg-box half"></div>×0.5 부분</div>
      <div class="leg"><div class="leg-box one"></div>×1 일반</div>
      <div class="leg"><div class="leg-box two"></div>×2 심함</div>
    </div>
    <svg id="carSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="sel-count" id="selCount" style="display:none"></div>
    <div class="price-bar" id="priceBar" style="display:none; width:100%; max-width:100%; margin-top:10px;">
      <div>
        <div class="price-label">예상 금액</div>
        <div class="price-detail" id="priceDetail"></div>
      </div>
      <div class="price-amount" id="priceAmount"></div>
    </div>
  </div>

  <!-- 체크리스트 -->
  <div class="left-body">
    <div class="cl-section"><div class="cl-title">범퍼</div><div class="cl-grid">
      <div class="cl-item" data-id="front_bumper" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">앞 범퍼</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
      <div class="cl-item" data-id="rear_bumper" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">뒤 범퍼</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
    </div></div>

    <div class="cl-section"><div class="cl-title">펜더</div><div class="cl-grid">
      <div class="cl-item" data-id="fender_fl" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">앞펜더 좌</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
      <div class="cl-item" data-id="fender_fr" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">앞펜더 우</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
      <div class="cl-item" data-id="fender_rl" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">뒷펜더 좌</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
      <div class="cl-item" data-id="fender_rr" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">뒷펜더 우</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
    </div></div>

    <div class="cl-section"><div class="cl-title">도어</div><div class="cl-grid">
      <div class="cl-item" data-id="door_fl" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">앞도어 좌</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
      <div class="cl-item" data-id="door_fr" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">앞도어 우</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
      <div class="cl-item" data-id="door_rl" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">뒷도어 좌</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
      <div class="cl-item" data-id="door_rr" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">뒷도어 우</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
    </div></div>

    <div class="cl-section"><div class="cl-title">상단</div><div class="cl-grid">
      <div class="cl-item" data-id="hood" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">후드</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
      <div class="cl-item" data-id="trunk" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">트렁크</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
      <div class="cl-item" data-id="roof" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">지붕</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
    </div></div>

    <div class="cl-section"><div class="cl-title">미러 / 스텝</div><div class="cl-grid">
      <div class="cl-item" data-id="mirror_l" data-fixed="0.5" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">미러 좌 <span style="font-size:11px;color:#bbb">×0.5</span></div></div></div>
      <div class="cl-item" data-id="mirror_r" data-fixed="0.5" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">미러 우 <span style="font-size:11px;color:#bbb">×0.5</span></div></div></div>
      <div class="cl-item" data-id="step_l" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">스텝 좌</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
      <div class="cl-item" data-id="step_r" onclick="tapItem(this)"><div class="cl-name-row"><div class="cl-box"></div><div class="cl-name">스텝 우</div></div><div class="cl-opts"><button class="opt-btn" data-v="0.5" onclick="setOpt(event,this)">×0.5</button><button class="opt-btn sel" data-v="1" onclick="setOpt(event,this)">×1</button><button class="opt-btn" data-v="2" onclick="setOpt(event,this)">×2</button></div></div>
    </div></div>
  </div>

  <!-- 하단 버튼 -->
  <div class="left-foot">
    <button class="btn-submit" onclick="submit()">접수 저장 →</button>
    <button class="btn-clear" onclick="clearAll()">↺ 초기화</button>
  </div>

</div>
<div class="toast" id="toast"></div>
<script>
const DM = {
  front_bumper:'p-fb', rear_bumper:'p-rb',
  fender_fl:'p-ffl', fender_fr:'p-ffr', fender_rl:'p-frl', fender_rr:'p-frr',
  door_fl:'p-dfl', door_fr:'p-dfr', door_rl:'p-drl', door_rr:'p-drr',
  hood:'p-hood', trunk:'p-trunk', roof:'p-roof',
  mirror_l:'p-ml', mirror_r:'p-mr', step_l:'p-sl', step_r:'p-sr',
  pil_al:'p-pal', pil_ar:'p-par', pil_bl:'p-pbl', pil_br:'p-pbr', pil_cl:'p-pcl', pil_cr:'p-pcr',
};
const state={};
let panelRate = 90000;

// 오늘 날짜
const today = new Date();
const yy = today.getFullYear();
const mm = String(today.getMonth()+1).padStart(2,'0');
const dd = String(today.getDate()).padStart(2,'0');
document.getElementById('todayDate').textContent = `${yy}.${mm}.${dd}`;

function setCarType(btn) {
  document.querySelectorAll('.ct-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  panelRate = parseInt(btn.dataset.rate);
  updatePrice();
}
function getOpt(el){const s=el.querySelector('.opt-btn.sel');return s?s.dataset.v:'1';}
function tapItem(el){
  const id=el.dataset.id;
  if(el.classList.contains('checked')){el.classList.remove('checked');delete state[id];}
  else{el.classList.add('checked');state[id]=el.dataset.fixed||getOpt(el);}
  syncSvg();updateCount();
}
function setOpt(e,btn){
  e.stopPropagation();
  const item=btn.closest('.cl-item'),id=item.dataset.id;
  item.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  if(item.classList.contains('checked')){state[id]=btn.dataset.v;syncSvg();}
}
function svgTap(id){const el=document.querySelector(`.cl-item[data-id="${id}"]`);if(el)tapItem(el);}
function syncSvg(){
  document.querySelectorAll('.cp').forEach(e=>e.classList.remove('hit-half','hit-one','hit-two'));
  document.querySelectorAll('[id$="-t"]').forEach(t=>t.setAttribute('fill','#444'));
  Object.entries(state).forEach(([id,v])=>{
    const el=document.getElementById(DM[id]);if(!el)return;
    if(v==='0.5')el.classList.add('hit-half');
    else if(v==='2'){el.classList.add('hit-two');const t=document.getElementById(DM[id]+'-t');if(t)t.setAttribute('fill','#fff');}
    else el.classList.add('hit-one');
  });
}
function updateCount(){
  const el=document.getElementById('selCount'),n=Object.keys(state).length;
  el.style.display=n?'block':'none';
  if(n)el.textContent=`${n}개 부위 선택됨`;
  updatePrice();
}
function updatePrice(){
  const bar=document.getElementById('priceBar');
  const detail=document.getElementById('priceDetail');
  const amount=document.getElementById('priceAmount');
  const entries=Object.entries(state);
  if(!entries.length){bar.style.display='none';return;}
  let total=0;
  entries.forEach(([id,v])=>{
    const r=parseFloat(v)||1;
    total += panelRate * r;
  });
  const ctBtn=document.querySelector('.ct-btn.on');
  const typeName=ctBtn?ctBtn.textContent:'국산';
  const panels=entries.map(([id,v])=>`${v}판`).join(', ');
  bar.style.display='flex';
  detail.textContent=`${typeName} · ${entries.length}개 부위`;
  amount.textContent=total.toLocaleString()+'원';
}
function clearAll(){
  Object.keys(state).forEach(k=>delete state[k]);
  document.querySelectorAll('.cl-item').forEach(el=>{
    el.classList.remove('checked');
    el.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('sel'));
    const def=el.querySelector('.opt-btn[data-v="1"]');if(def)def.classList.add('sel');
  });
  syncSvg();updateCount();
  document.getElementById('f-carnum').value='';
  document.getElementById('f-dealer').value='';
  const fm=document.getElementById('f-carmodel');if(fm)fm.value='';
  updatePrice();
}
function submit(){
  const carnum=document.getElementById('f-carnum').value.trim();
  const dealer=document.getElementById('f-dealer').value.trim();
  if(!carnum||!dealer){showToast('⚠️ 차량번호와 딜러명 입력해주세요');return;}
  if(!Object.keys(state).length){showToast('⚠️ 수리 부위를 선택해주세요');return;}
  showToast(`✅ ${carnum} 접수 완료 (${Object.keys(state).length}개 부위)`);
  setTimeout(clearAll,1600);
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function renderSvg(){
  const svg=document.getElementById('carSvg');
  const W=600, cx=W/2, sp=20, gap=12;
  const bh=48, hh=96, dh=96, th=76, fw=48, sw=16, mw=22, mh=36, rw=108, dw=93;
  const y_fb=24, y_hd=y_fb+bh+sp, y_d1=y_hd+hh+sp, y_d2=y_d1+dh+sp, y_tk=y_d2+dh+sp, y_rb=y_tk+th+sp;
  const totalH=y_rb+bh+32;
  const roof_x=cx-rw/2, door_lx=roof_x-gap-dw, door_rx=roof_x+rw+gap;
  const step_lx=door_lx-gap-sw, step_rx=door_rx+dw+gap;
  const body_x=door_lx, body_w=dw+gap+rw+gap+dw;
  const fend_lx=body_x-gap-fw, fend_rx=body_x+body_w+gap;
  const mir_lx=fend_lx-6-mw, mir_rx=fend_rx+fw+6;
  const bmp_x=cx-body_w/2+12, bmp_w=body_w-24;
  const roof_h=dh*2+sp, step_h=dh*2+sp;
  const pA_w=roof_x-(door_lx+dw)-2, pA_h=dh, pA_lx=door_lx+dw+1, pA_rx=roof_x+rw+1, pA_y=y_d1;
  const pB_h=pA_w, pB_w=dw, pB_y=y_d1+Math.round(roof_h/2)-Math.round(pB_h/2);
  const pB_lx=door_lx, pB_rx=door_rx+dw-pB_w;
  const pC_w=pA_w, pC_h=dh, pC_lx=pA_lx, pC_rx=pA_rx, pC_y=y_d2;
  svg.setAttribute('viewBox',`0 0 ${W} ${totalH}`);
  const fs=Math.max(11,Math.round(W*0.028));
  const p=(id,x,y,w,h,rx,label,rot)=>{
    const pid=DM[id]||('p-'+id),lx=x+w/2,ly=y+h/2;
    const tr=rot?`transform="rotate(${rot},${lx},${ly})"`:'';
    return `<rect id="${pid}" class="cp" x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" fill="#eeece6" stroke="#999" stroke-width="2.5" onclick="svgTap('${id}')"/>
    <text id="${pid}-t" x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="${fs}" fill="#444" font-weight="700" pointer-events="none" font-family="Noto Sans KR" ${tr}>${label}</text>`;
  };
  const pillar=(id,x,y,w,h,label)=>{
    const pid=DM[id]||('p-'+id),lx=x+w/2,ly=y+h/2;
    return `<rect id="${pid}" class="cp" x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="#d8d5ce" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4,3" onclick="svgTap('${id}')"/>
    <text id="${pid}-t" x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="${Math.max(9,fs-2)}" fill="#888" font-weight="700" pointer-events="none" font-family="Noto Sans KR">${label}필러</text>`;
  };
  svg.innerHTML=`
    <defs><pattern id="pat-half" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#fff"/><line x1="0" y1="0" x2="0" y2="8" stroke="#888" stroke-width="3.5"/>
    </pattern></defs>
    ${p('front_bumper',bmp_x,y_fb,bmp_w,bh,12,'앞 범퍼',0)}
    ${p('hood',body_x,y_hd,body_w,hh,7,'후드',0)}
    ${p('fender_fl',fend_lx,y_hd,fw,hh,7,'앞펜더 좌',-90)}
    ${p('fender_fr',fend_rx,y_hd,fw,hh,7,'앞펜더 우',90)}
    ${p('mirror_l',mir_lx,y_hd+hh/2-mh/2,mw,mh,7,'미러',0)}
    ${p('mirror_r',mir_rx,y_hd+hh/2-mh/2,mw,mh,7,'미러',0)}
    ${p('roof',roof_x,y_d1,rw,roof_h,9,'지붕',0)}
    ${p('step_l',step_lx,y_d1,sw,step_h,5,'스텝',-90)}
    ${p('step_r',step_rx,y_d1,sw,step_h,5,'스텝',90)}
    ${p('door_fl',door_lx,y_d1,dw,dh,6,'앞도어 좌',0)}
    ${p('door_fr',door_rx,y_d1,dw,dh,6,'앞도어 우',0)}
    ${pillar('pil_al',pA_lx,pA_y,pA_w,pA_h,'A')}
    ${pillar('pil_ar',pA_rx,pA_y,pA_w,pA_h,'A')}
    ${pillar('pil_bl',pB_lx,pB_y,pB_w,pB_h,'B')}
    ${pillar('pil_br',pB_rx,pB_y,pB_w,pB_h,'B')}
    ${pillar('pil_cl',pC_lx,pC_y,pC_w,pC_h,'C')}
    ${pillar('pil_cr',pC_rx,pC_y,pC_w,pC_h,'C')}
    ${p('door_rl',door_lx,y_d2,dw,dh,6,'뒷도어 좌',0)}
    ${p('door_rr',door_rx,y_d2,dw,dh,6,'뒷도어 우',0)}
    ${p('trunk',body_x,y_tk,body_w,th,7,'트렁크',0)}
    ${p('fender_rl',fend_lx,y_tk,fw,th,7,'뒷펜더 좌',-90)}
    ${p('fender_rr',fend_rx,y_tk,fw,th,7,'뒷펜더 우',90)}
    ${p('rear_bumper',bmp_x,y_rb,bmp_w,bh,12,'뒤 범퍼',0)}
    <text x="8" y="${y_fb+16}" font-size="11" fill="#ccc" font-family="monospace">앞▲</text>
    <text x="8" y="${y_rb+bh}" font-size="11" fill="#ccc" font-family="monospace">뒤▼</text>
    <text x="8" y="${y_d1+roof_h/2+5}" font-size="12" fill="#ddd" font-family="Noto Sans KR">좌</text>
    <text x="${W-16}" y="${y_d1+roof_h/2+5}" font-size="12" fill="#ddd" font-family="Noto Sans KR">우</text>`;
}
renderSvg();
</script>
</body>
</html>
